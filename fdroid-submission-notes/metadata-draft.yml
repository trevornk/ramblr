    versionCode: 4
    # JUDGMENT CALL (see NOTES.md "Build commit"): this is the full commit
    # hash for d61a4a2, which is AHEAD of the v1.0.1 tag. The v1.0.1 tag
    # itself still points at the OLD prebuilt-AAR-from-GitHub-Releases
    # native libs and must NOT be used as the F-Droid build commit -- it
