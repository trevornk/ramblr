# --- AntiFeatures ---------------------------------------------------------
# JUDGMENT CALL (see NOTES.md "AntiFeatures" for full reasoning): Ramblr
# offers OPTIONAL cloud cleanup/transcription providers (OpenAI, Anthropic,
# Gemini) that the user must explicitly configure with their OWN API key.
# No provider is enabled or contacted by default; on-device Whisper/
# sherpa-onnx transcription + on-device llama.cpp cleanup is the out-of-
# the-box behavior with zero network calls. Per fdroiddata's own
# config/antiFeatures.yml, NonFreeNet is defined as: "This app promotes or
# depends entirely on a non-free network service." Ramblr does not depend
# entirely on any non-free network service (core transcription + cleanup
# work fully offline), and does not promote a specific non-free service
# over the free/on-device path -- cloud providers are one of several
# opt-in destinations the user can wire up, off by default. Conclusion:
# NonFreeNet is NOT warranted here. No AntiFeatures tag applied.
# UNVERIFIED: this is our best-effort reading of fdroiddata's own
# antiFeatures.yml description text; it has not been confirmed against
# actual F-Droid maintainer precedent/rulings for comparable BYO-cloud-key
# apps. Flag for human review before submission -- see NOTES.md.

