# --- AntiFeatures ---------------------------------------------------------
# UPDATED (see NOTES.md "AntiFeatures / NonFreeNet decision"): a follow-up
# research pass into actual F-Droid policy/precedent for comparable BYO-key
# optional-cloud apps changed this from "no AntiFeatures" to "apply
# NonFreeNet." F-Droid's own precedent trends toward tagging NonFreeNet even
# when a non-free network service is OPTIONAL and off-by-default, not only
# when an app "depends entirely" on one, per config/antiFeatures.yml wording
# read literally, F-Droid maintainer practice reads it more broadly in
# review. NOT independently confirmed by an actual F-Droid maintainer ruling
# on Ramblr specifically -- flag for maintainer review at MR time, but the
# safer default before submission is to declare it upfront rather than have
# a reviewer add it (or reject the MR) later.
AntiFeatures:
  - NonFreeNet


# --- Builds ----------------------------------------------------------------
RepoType: git
Repo: https://github.com/trevornk/ramblr.git

Builds:
  - versionName: '1.0.3'
    versionCode: 6
    # UPDATED: v1.0.2 lacked the kissfft + kaldifst transitive-dependency
    # vendoring fix (discovered via a REAL network-isolation build test, see
    # NOTES.md "REAL NETWORK-ISOLATION BUILD PROOF"). v1.0.3 is the first tag
    # that contains a build genuinely verified to succeed with zero network
    # access. versionCode/versionName re-verified directly against
    # app/build.gradle.kts at this bump.
    commit: v1.0.3
    subdir: app
    submodules: true

    # --- FetchContent-at-configure-time fix -----------------------------
    # sherpa-onnx's own CMake, plus TWO further layers of TRANSITIVE
    # dependencies only discovered via an actual network-isolation build
    # (blocking github.com et al. at the OS /etc/hosts level and running a
    # real `./gradlew clean assembleDebug`), calls FetchContent_Declare()
    # for 7 total small SOURCE tarballs/repos at CMake configure time:
    #   kaldi-native-fbank, kaldi-decoder, openfst, simple-sentencepiece,
    #   json          (direct sherpa-onnx deps)
    #   kissfft       (transitive: pulled unconditionally by
    #                  kaldi-native-fbank's own CMakeLists.txt)
    #   kaldifst      (transitive: pulled unconditionally by
    #                  kaldi-decoder's own CMakeLists.txt)
    # F-Droid's build server has NO network access during the sandboxed
    # build step, so this breaks an F-Droid build as-is.
    #
    # STATUS: IMPLEMENTED AND VERIFIED via a genuine offline build (not just
    # planned/assumed). All 7 deps are vendored as additional pinned git
    # submodules under app/src/main/cpp/sherpa_onnx/deps/{kaldi-native-fbank,
    # kaldi-decoder,openfst,simple-sentencepiece,json,kissfft,kaldifst}, each
    # checked out at the exact tag/hash each .cmake file's
    # FetchContent_Declare() targets (verified via `git describe --tags` /
    # `git rev-parse HEAD` per submodule). The CMake wiring lives in
    # app/src/main/cpp/sherpa_onnx/CMakeLists.txt, which sets
    # FETCHCONTENT_SOURCE_DIR_<NAME> for each dep before add_subdirectory()
    # pulls in the sherpa-onnx submodule -- CMake's own FetchContent
    # override mechanism, requiring zero changes to sherpa-onnx's,
    # kaldi-native-fbank's, or kaldi-decoder's own CMakeLists.txt.
    #
    # A REAL network-isolation build (GitHub hosts blocked at /etc/hosts,
    # verified restored after) succeeded: `BUILD SUCCESSFUL in 5m 55s`, and
    # the resulting APK was confirmed to contain both
    # lib/arm64-v8a/libonnxruntime.so and
    # lib/arm64-v8a/libsherpa-onnx-jni.so at correct sizes. Full details in
    # NOTES.md "REAL NETWORK-ISOLATION BUILD PROOF".
    #
    # IMPORTANT CORRECTNESS NOTE (verified empirically against the
    # installed CMake 4.3.4 module, not assumed): FETCHCONTENT_SOURCE_DIR_
    # <NAME> uses a LITERAL string(TOUPPER ...) of the FetchContent_Declare()
    # name -- NOT a hyphen-to-underscore substitution. For
    # simple-sentencepiece the correct variable is
    # FETCHCONTENT_SOURCE_DIR_SIMPLE-SENTENCEPIECE (hyphen preserved). An
    # underscore version silently falls through to a real network fetch
    # attempt instead of erroring, which would have been a subtle,
    # hard-to-notice F-Droid build failure. A local CMake reproduction
    # confirmed both the working (hyphen) and broken (underscore) forms.
    #
    # NOTED VERSION SKEW (documented, not hidden -- see NOTES.md): kaldifst
    # v1.8.0's own openfst.cmake requests openfst tag v1.8.5-2026-04-10, one
    # day earlier than sherpa-onnx's own openfst pin of v1.8.5-2026-04-11
    # (already vendored). FetchContent_Declare()'s per-name idempotency means
    # both consumers end up using the -04-11 checkout -- a deliberate,
    # low-risk choice given the tags are a one-day-apart republish of the
    # same upstream fork.
    #
    # No prebuild: hook is needed for this fix -- the submodules are
    # already checked out at their pinned commits by `submodules: true`
    # above, and CMakeLists.txt itself references app/src/main/cpp/
    # sherpa_onnx/deps/<name> directly.
    gradle:
      - yes
    output: build/outputs/apk/release/app-release-unsigned.apk

