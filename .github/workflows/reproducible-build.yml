name: Reproducible release build

# Builds the UNSIGNED release APK on Linux so it can be independently byte-diffed against
# F-Droid's own Linux buildserver rebuild (fdroid/fdroiddata!42401, reviewer linsui). The
# release signing key never touches this workflow or any GitHub secret -- see
# app/build.gradle.kts's keystore.properties fallback: with no keystore.properties present,
# the release variant simply falls back to debug signing, so `assembleRelease` here produces
# a buildable-but-unsigned-for-distribution artifact. Signing happens locally afterward,
# offline, straight from the 1Password-held key, then the signed APK is what actually gets
# uploaded to a GitHub Release matching the `Binaries:` URL template in fdroiddata.
#
# Tag-triggered rather than push-triggered like release.yml/ci.yml: this only needs to run
# once per real version bump (matching the `Binaries:` field's specific versionName/versionCode
# pin), not on every commit to main.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      ref:
        description: >-
          Optional commit SHA/tag to check out instead of the triggering ref. Needed to rebuild
          a specific already-tagged release's reference APK (e.g. for F-Droid Binaries: URL
          verification) after this workflow file itself was added on a later commit --
          workflow_dispatch requires the workflow file to exist at the dispatched ref, but the
          embedded version-control-info in the built APK must match the exact metadata-pinned
          commit, not just "whatever main/tag currently resolves the workflow file from".
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build-unsigned-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Actions pinned to full commit SHAs, not mutable tags (L-3); see ci.yml/release.yml.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Empty string (unset input, or a plain `push` trigger) falls back to the actions/
          # checkout default (the triggering ref) -- only override when explicitly given.
          ref: ${{ inputs.ref || '' }}
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Assemble unsigned release APK
        run: ./gradlew assembleRelease

      - name: Upload unsigned release APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: app-release-unsigned
          # app/build.gradle.kts's outputFileName override names this
          # Ramblr-<versionName>-<flavor>-release.apk regardless of signing state (it's
          # unsigned-for-distribution here, still debug-signed by the keystore.properties
          # fallback so the build itself succeeds) -- updated for the "github"/"storefront"
          # distribution flavor split (app/build.gradle.kts), which inserted the flavor name
          # into the output filename and made the old bare "-release.apk" pattern stale.
          path: app/build/outputs/apk/github/release/Ramblr-*-github-release.apk
          if-no-files-found: error
