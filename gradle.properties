android.useAndroidX=true
# Release builds run native-code compilation (sherpa-onnx/llama.cpp/onnxruntime),
# resource merging, lintVitalAnalyzeRelease, and dexing largely in the same pass.
# F-Droid's CI build runner has limited RAM and was hitting Gradle's default JVM
# heap/metaspace ceiling (512MiB heap / 384MiB metaspace), causing GC thrashing
# and a daemon crash mid-build (not a code or dependency-verification issue --
# that part now passes). Raise the daemon heap/metaspace explicitly so the full
# release build has headroom on constrained CI runners.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=1024m
